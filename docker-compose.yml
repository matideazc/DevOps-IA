services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: aioffice
      POSTGRES_PASSWORD: aioffice_dev
      POSTGRES_DB: aioffice
    command: ["postgres", "-c", "password_encryption=md5", "-c", "hba_file=/etc/pg_hba_custom.conf"]
    ports:
      - '5450:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/pg_hba.conf:/etc/pg_hba_custom.conf:ro
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'aioffice']
      interval: 5s
      retries: 5

volumes:
  pgdata:
